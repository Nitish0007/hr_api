services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: hr_api:latest
    ports:
      - "${WEB_PUBLISH_PORT:-3000}:3000"
    environment:
      environment:
        RAILS_ENV: ${RAILS_ENV:-production}
        PORT: ${PORT:-3000}
        SOLID_QUEUE_IN_PUMA: ${SOLID_QUEUE_IN_PUMA:-1}
        DATABASE_URL: ${DATABASE_URL}
        REDIS_URL: ${REDIS_URL}
        ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hr_api_production}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hr_api_production}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
