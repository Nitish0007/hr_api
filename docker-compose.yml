services:
  hr_api:
    build: .
    ports:
      - "80:80"
    env_file: .env
    depends_on:
      - hrdb
      - redis
    volumes:
      - ./tmp:/rails/tmp
      - ./log:/rails/log

  hrdb:
    image: postgres:15
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - hr_db_data:/var/lib/postgresql

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - hr_redis_data:/data

volumes:
  hr_db_data:
  hr_redis_data: